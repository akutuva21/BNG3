name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Build platform-specific CLI binaries
  # ═══════════════════════════════════════════════════════════════════════════

  build-binaries:
    name: Build CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: bionetgen-linux-x86_64
            binary_ext: ""
          - os: macos-13
            artifact_name: bionetgen-macos-x86_64
            binary_ext: ""
          - os: macos-14
            artifact_name: bionetgen-macos-arm64
            binary_ext: ""
          - os: windows-2022
            artifact_name: bionetgen-windows-x86_64
            binary_ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install cmake ninja

      - name: Setup MSVC (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DBUILD_CLI=ON \
            -DBUILD_NFSIM_CLI=ON \
            -DBUILD_TESTS=OFF
        shell: bash

      - name: Build
        run: cmake --build build --config Release

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          cp build/cpp/bng_cpp${{ matrix.binary_ext }} dist/${{ matrix.artifact_name }}/
          cp build/cpp/NFsim${{ matrix.binary_ext }} dist/${{ matrix.artifact_name }}/ 2>/dev/null || true
          cp README.md dist/${{ matrix.artifact_name }}/
          cd dist && tar czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz

  # ═══════════════════════════════════════════════════════════════════════════
  # Build Python wheels for all platforms
  # ═══════════════════════════════════════════════════════════════════════════

  build-wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-13, macos-14, windows-2022]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup MSVC (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.21.3

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32"
          CIBW_TEST_REQUIRES: pytest numpy
          CIBW_TEST_COMMAND: pytest {project}/tests/python/test_cpp_backend.py -v --tb=short
          CIBW_ENVIRONMENT: CMAKE_ARGS="-DBUILD_TESTS=OFF -DBUILD_CLI=OFF"
          CIBW_ARCHS_MACOS: "arm64 x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ═══════════════════════════════════════════════════════════════════════════
  # Build source distribution
  # ═══════════════════════════════════════════════════════════════════════════

  build-sdist:
    name: Source Distribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build
      - run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ═══════════════════════════════════════════════════════════════════════════
  # Create GitHub Release with all artifacts
  # ═══════════════════════════════════════════════════════════════════════════

  release:
    name: Create Release
    needs: [build-binaries, build-wheels, build-sdist]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Organize release assets
        run: |
          mkdir -p release-assets
          # CLI binaries
          cp artifacts/bionetgen-*/*.tar.gz release-assets/
          # Python wheels
          cp artifacts/wheels-*/*.whl release-assets/
          # Source dist
          cp artifacts/sdist/*.tar.gz release-assets/
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Publish to PyPI
  # ═══════════════════════════════════════════════════════════════════════════

  publish-pypi:
    name: Publish to PyPI
    needs: [release]
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheels and sdist
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
          pattern: "{wheels-*,sdist}"

      - name: Flatten dist directory
        run: |
          mkdir -p flat-dist
          find dist -name "*.whl" -exec cp {} flat-dist/ \;
          find dist -name "*.tar.gz" -exec cp {} flat-dist/ \;
          ls flat-dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: flat-dist/
